# ShopScanner Configuration

# Chat prefix for all messages
prefix: "§6[Scanner]§r "

# Maximum containers per shop
max-containers-per-shop: 54

# Shopping District Zone
# All scanner actions only work within this zone.
# Zone = square area of chunks in the overworld.
shopping-district:
  # Name of the overworld (usually "world")
  world: "world"
  # Center chunk coordinates
  center-chunk-x: 0
  center-chunk-z: 0
  # Radius in chunks around the center chunk
  # 5 = zone from chunk -5,-5 to 5,5 (11x11 chunks = 176x176 blocks)
  radius-chunks: 5

# Lectern Scan Radius
# Only containers within a 3x3 chunk area around the lectern are scanned.
# Containers outside are marked as "out of scan range" in the book.
# This value is fixed at 1 (3x3) and not configurable.

# Sound effects (use lowercase sound IDs, e.g., block.chest.locked)
sounds:
  register: "block.chest.locked"
  deregister: "block.chest.close"
  scan-complete: "entity.experience_orb.pickup"
  error: "entity.villager.no"

# Container Highlighting
# Shows particles around registered containers when holding a scanner
highlighting:
  enabled: true
  # Particle color for containers (hex)
  container-color: "#00FF00"
  # Number of particles in the ring
  particle-count: 8
  # Update interval in ticks (20 ticks = 1 second)
  update-interval: 10
