name: ShopScanner
version: "${version}"
main: com.example.shopscanner.ShopScannerPlugin
description: "Shop inventory scanner - scan containers and generate book reports"
api-version: "1.21"
authors:
  - paraf0x

permissions:
  shopscanner.use:
    description: "Use the scanner (all actions)"
    default: op
  shopscanner.give:
    description: "Use /shopscanner give command"
    default: op
  shopscanner.admin:
    description: "Use /shopscanner reload and list commands"
    default: op
